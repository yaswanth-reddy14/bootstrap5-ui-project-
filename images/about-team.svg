<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" width="560" height="420" role="img" aria-label="Team collaborating illustration">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0ff"/>
      <stop offset="1" stop-color="#f8f9ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="560" height="420" rx="24" fill="url(#tbg)"/>

  <!-- table -->
  <rect x="120" y="300" width="320" height="24" rx="12" fill="#dfe2f4"/>

  <!-- person 1 -->
  <g>
    <circle cx="180" cy="200" r="34" fill="#4f46e5"/>
    <rect x="150" y="238" width="60" height="70" rx="24" fill="#4f46e5"/>
    <circle cx="180" cy="190" r="14" fill="#eef0ff"/>
  </g>
  <!-- person 2 -->
  <g>
    <circle cx="280" cy="180" r="40" fill="#7c73ff"/>
    <rect x="244" y="222" width="72" height="82" rx="26" fill="#7c73ff"/>
    <circle cx="280" cy="168" r="16" fill="#eef0ff"/>
  </g>
  <!-- person 3 -->
  <g>
    <circle cx="384" cy="200" r="34" fill="#59c689"/>
    <rect x="354" y="238" width="60" height="70" rx="24" fill="#59c689"/>
    <circle cx="384" cy="190" r="14" fill="#eef0ff"/>
  </g>

  <!-- speech bubbles -->
  <rect x="96" y="96" width="120" height="52" rx="14" fill="#ffffff" stroke="#e7e9f6"/>
  <rect x="112" y="114" width="70" height="8" rx="4" fill="#d7dbf3"/>
  <rect x="112" y="128" width="50" height="8" rx="4" fill="#e2e5f5"/>

  <rect x="344" y="80" width="128" height="56" rx="14" fill="#ffffff" stroke="#e7e9f6"/>
  <rect x="360" y="98" width="80" height="8" rx="4" fill="#a9dcbf"/>
  <rect x="360" y="114" width="56" height="8" rx="4" fill="#e2e5f5"/>
</svg>
